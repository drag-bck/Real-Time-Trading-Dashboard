version: "3.9"
services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - JWT_SECRET=dev-secret
      - TICK_INTERVAL_MS=1000
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4000
        VITE_WS_URL: ws://localhost:4000/ws
    ports:
      - "8080:80"
    depends_on:
      - backend
