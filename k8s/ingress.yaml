apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trading-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
    - host: trading.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend: { service: { name: trading-backend, port: { number: 4000 } } }
          - path: /ws
            pathType: Prefix
            backend: { service: { name: trading-backend, port: { number: 4000 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: trading-frontend, port: { number: 80 } } }
